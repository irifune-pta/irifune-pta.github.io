<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 300" width="440" height="300"
     font-family="'Hiragino Sans', 'Meiryo', sans-serif" font-size="14">

  <!-- 背景 -->
  <rect width="440" height="300" fill="white"/>

  <!-- 校庭ラベル -->
  <text x="48" y="28" font-size="14" fill="#111">校庭</text>

  <!-- 体育館（左・実線） -->
  <rect x="8" y="45" width="88" height="175" fill="none" stroke="#111" stroke-width="2"/>
  <text x="52" y="133" font-size="14" fill="#111" text-anchor="middle" dominant-baseline="middle">体育館</text>

  <!-- 校舎（右・実線） -->
  <rect x="348" y="45" width="84" height="175" fill="none" stroke="#111" stroke-width="2"/>
  <text x="390" y="133" font-size="14" fill="#111" text-anchor="middle" dominant-baseline="middle">校舎</text>

  <!-- 渡り廊下（一点鎖線の外枠） -->
  <rect x="97" y="115" width="248" height="98"
        fill="none" stroke="#111" stroke-width="1.5"
        stroke-dasharray="10,3,2,3"/>
  <!-- 渡り廊下ラベル -->
  <text x="113" y="181" font-size="13" fill="#111">渡り廊下</text>

  <!-- 物置（一点鎖線の内枠） -->
  <rect x="248" y="121" width="93" height="87"
        fill="none" stroke="#111" stroke-width="1.5"
        stroke-dasharray="10,3,2,3"/>
  <!-- 物置ラベル -->
  <text x="294" y="138" font-size="13" fill="#111" text-anchor="middle">物置</text>

  <!-- ★ ボックス（実線） -->
  <rect x="264" y="144" width="60" height="54"
        fill="none" stroke="#111" stroke-width="1.5"/>
  <!-- ★ -->
  <text x="294" y="180" font-size="26" fill="#111" text-anchor="middle">★</text>

</svg>
